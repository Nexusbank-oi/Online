<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Premier Mobile</title>
    <style>
        :root { --gold: #d4af37; --dark: #0b0c0d; --surface: #1a1c1e; --text: #f4f5f7; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: var(--dark); padding-bottom: 80px; }
        
        /* Mobile Header */
        .header { background: var(--surface); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: bold; letter-spacing: 3px; color: var(--gold); font-size: 1.2rem; }
        
        .container { padding: 20px; }

        /* Real-look Debit Card */
        .card-container { perspective: 1000px; margin-bottom: 30px; }
        .debit-card {
            background: linear-gradient(135deg, #222 0%, #000 100%);
            width: 100%;
            aspect-ratio: 1.58/1;
            border-radius: 15px;
            padding: 20px;
            color: white;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-nexus { color: var(--gold); font-weight: bold; font-size: 0.9rem; letter-spacing: 2px; }
        .chip { width: 45px; height: 35px; background: linear-gradient(135deg, #d4af37, #f1d592); border-radius: 5px; margin: 10px 0; }
        .card-number { font-family: 'Courier New', monospace; font-size: 1.3rem; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .holder-name { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Balance View */
        .balance-section { text-align: center; margin: 20px 0 30px 0; }
        .bal-label { font-size: 0.75rem; color: #777; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .bal-amount { font-size: 2.5rem; font-weight: bold; color: var(--dark); margin: 5px 0; }

        /* Quick Actions */
        .actions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .action-btn { background: white; border-radius: 12px; padding: 15px 5px; text-align: center; font-size: 0.7rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .action-icon { font-size: 1.2rem; display: block; margin-bottom: 5px; }

        /* History */
        .history-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .history-item:last-child { border-bottom: none; }
        .tx-info b { display: block; font-size: 0.9rem; }
        .tx-info small { color: #888; font-size: 0.75rem; }
        .tx-amt { font-weight: bold; font-size: 0.95rem; }
        .tx-amt.pos { color: #27ae60; }
        .tx-amt.neg { color: #c0392b; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.65rem; text-align: center; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body onload="initMobile()">

<div class="header">
    <div class="brand">NEXUS</div>
    <div style="font-size: 0.7rem; background: var(--gold); color: black; padding: 3px 8px; border-radius: 10px; font-weight: bold;">PREMIER</div>
</div>

<div class="container">
    <div class="balance-section">
        <div class="bal-label">Available Balance</div>
        <div class="bal-amount" id="mBal">$1,756,000.00</div>
        <div style="font-size: 0.75rem; color: var(--gold);">Nexus Private Wealth (...4829)</div>
    </div>

    <!-- Real Look Debit Card -->
    <div class="card-container">
        <div class="debit-card">
            <div class="card-nexus">NEXUS BANK</div>
            <div class="chip"></div>
            <div class="card-number">4112 8890 1234 4829</div>
            <div class="card-footer">
                <div class="holder-name">HYUN</div>
                <img src="https://wikimedia.org" width="40">
            </div>
        </div>
    </div>

    <div class="actions-grid">
        <div class="action-btn" onclick="location.href='transfer.html'"><span class="action-icon">💸</span>Transfer</div>
        <div class="action-btn"><span class="action-icon">📊</span>Wealth</div>
        <div class="action-btn"><span class="action-icon">🛡️</span>Secure</div>
        <div class="action-btn" onclick="location.href='settings.html'"><span class="action-icon">⚙️</span>Settings</div>
    </div>

    <div class="history-card">
        <h3 style="margin: 0 0 15px 0; font-size: 1rem;">Recent Activity</h3>
        <div id="mHistory">
            <div class="history-item">
                <div class="tx-info"><b>Asset Management Fee</b><small>Apr 02, 2026</small></div>
                <div class="tx-amt neg">-$2,500.00</div>
            </div>
            <div class="history-item">
                <div class="tx-info"><b>Dividend Reinvestment</b><small>Mar 29, 2026</small></div>
                <div class="tx-amt pos">+$14,200.00</div>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-item active">Home</a>
    <a href="transfer.html" class="nav-item">Payments</a>
    <a href="settings.html" class="nav-item">Profile</a>
    <a href="login.html" class="nav-item">Sign Out</a>
</div>

<script>
    function initMobile() {
        let b = localStorage.getItem('bankBalance') || 1756000;
        document.getElementById('mBal').innerText = "$" + parseFloat(b).toLocaleString(undefined, {minimumFractionDigits: 2});

        let h = JSON.parse(localStorage.getItem('transHistory')) || [];
        const container = document.getElementById('mHistory');
        
        h.reverse().forEach(tx => {
            let item = `
            <div class="history-item">
                <div class="tx-info"><b>Transfer to ${tx.to}</b><small>${tx.date} • PENDING</small></div>
                <div class="tx-amt neg">-$${parseFloat(tx.amount).toLocaleString()}</div>
            </div>`;
            container.innerHTML = item + container.innerHTML;
        });
    }
</script>

</body>
</html>
